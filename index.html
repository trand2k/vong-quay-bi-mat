<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IELTS Speaking – Vòng Quay Luyện Tập 🔄</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      margin-bottom: 0.5rem;
      color: #312e81;
      font-size: 1.8rem;
      text-align: center;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    .wheel-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 1rem 0;
    }

    #wheel {
      width: 320px;
      height: 320px;
      border: 8px solid #a5b4fc;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: transform 2s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      background: #c7d2fe;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(79,70,229,0.18);
    }

    .hiddenText {
      color: #fff;
      text-align: center;
      padding: 0 20px;
      font-weight: 600;
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
      word-break: break-word;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .wheel-pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 28px solid #dc2626;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      z-index: 10;
    }

    .result-box {
      background: #fff;
      border: 2px solid #6366f1;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      color: #312e81;
      min-height: 3rem;
      margin: 0.5rem 0 1rem;
      word-break: break-word;
      line-height: 1.5;
    }

    .topic-badge {
      font-size: 0.8rem;
      font-weight: 600;
      background: #e0e7ff;
      color: #4338ca;
      border-radius: 20px;
      padding: 2px 10px;
      margin-bottom: 6px;
      display: inline-block;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    button {
      padding: 0.5rem 1.1rem;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #4f46e5;
      color: white;
      font-weight: 600;
      transition: background 0.15s;
    }

    button:hover { background-color: #4338ca; }
    button.danger { background-color: #dc2626; }
    button.danger:hover { background-color: #b91c1c; }
    button.secondary { background-color: #6b7280; }
    button.secondary:hover { background-color: #4b5563; }

    .add-panel {
      background: #fff;
      border: 1px solid #c7d2fe;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      max-width: 480px;
      width: 100%;
      margin-bottom: 1rem;
    }

    .add-panel label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    .add-panel select, .add-panel input[type="text"] {
      width: 100%;
      padding: 0.4rem 0.6rem;
      border: 1px solid #a5b4fc;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 0.6rem;
    }

    .option-list {
      background: #fff;
      border: 1px solid #c7d2fe;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      max-width: 480px;
      width: 100%;
      display: none;
      max-height: 55vh;
      overflow-y: auto;
    }

    .option-list h3 {
      margin: 0 0 0.6rem;
      color: #312e81;
    }

    .topic-section { margin-bottom: 1rem; }

    .topic-section h4 {
      background: #e0e7ff;
      color: #3730a3;
      border-radius: 6px;
      padding: 3px 8px;
      margin: 0 0 0.4rem;
      font-size: 0.9rem;
    }

    .topic-section ul {
      padding-left: 1.2rem;
      margin: 0;
    }

    .topic-section li {
      margin-bottom: 0.25rem;
      font-size: 0.88rem;
      color: #374151;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .topic-section li span { flex: 1; }

    .del-btn {
      background: none;
      border: none;
      color: #dc2626;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
      color: #374151;
      cursor: pointer;
    }

    .topic-filter-panel {
      background: #fff;
      border: 1px solid #c7d2fe;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      max-width: 480px;
      width: 100%;
      margin-bottom: 0.75rem;
    }

    .topic-filter-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .topic-filter-header span {
      font-weight: 700;
      color: #312e81;
      font-size: 0.95rem;
    }

    .topic-filter-header .sel-count {
      font-size: 0.8rem;
      background: #e0e7ff;
      color: #4338ca;
      border-radius: 20px;
      padding: 1px 9px;
      font-weight: 600;
    }

    .topic-filter-body {
      display: none;
      margin-top: 0.6rem;
    }

    .topic-filter-body.open { display: block; }

    .filter-actions {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }

    .filter-actions button {
      font-size: 0.78rem;
      padding: 0.25rem 0.7rem;
      background: #e0e7ff;
      color: #3730a3;
      border-radius: 6px;
    }

    .filter-actions button:hover { background: #c7d2fe; }

    .topic-checkbox-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.3rem 0.6rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .topic-checkbox-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.85rem;
      color: #374151;
      cursor: pointer;
    }

    .topic-checkbox-item input { cursor: pointer; accent-color: #4f46e5; }

    .part-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .part-tab {
      padding: 0.4rem 1.3rem;
      font-size: 0.9rem;
      font-weight: 700;
      border: 2px solid #4f46e5;
      border-radius: 20px;
      cursor: pointer;
      background: #fff;
      color: #4f46e5;
    }

    .part-tab.active {
      background: #4f46e5;
      color: #fff;
    }

    .part-tab:hover:not(.active) { background: #e0e7ff; }

    /* ── Timer ── */
    .timer-box {
      background: #fff;
      border: 2px solid #6366f1;
      border-radius: 14px;
      padding: 0.8rem 1.2rem;
      max-width: 480px;
      width: 100%;
      margin: 0 0 0.75rem;
      display: none;
    }

    .timer-phase {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .timer-phase.prep  { color: #d97706; }
    .timer-phase.speak { color: #16a34a; }
    .timer-phase.done  { color: #6b7280; }

    .timer-display {
      font-size: 2.6rem;
      font-weight: 800;
      color: #312e81;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .timer-display.warn { color: #dc2626; }

    .timer-bar-wrap {
      width: 100%;
      height: 8px;
      background: #e0e7ff;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 0.6rem;
    }

    .timer-bar {
      height: 100%;
      border-radius: 99px;
      transition: width 1s linear, background 0.3s;
      background: #6366f1;
    }

    .timer-bar.prep-bar  { background: #f59e0b; }
    .timer-bar.speak-bar { background: #22c55e; }
    .timer-bar.warn-bar  { background: #dc2626; }

    .timer-btn-row {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
    }

    .timer-btn-row button {
      font-size: 0.82rem;
      padding: 0.3rem 0.9rem;
    }
  </style>
</head>
<body>

  <h1 id="mainTitle">🌀 IELTS Speaking Part 1</h1>
  <p class="subtitle">Quay vòng để lấy câu hỏi / cue card ngẫu nhiên!</p>

  <div class="part-tabs">
    <button class="part-tab active" id="tab1" onclick="switchPart(1)">Part 1 – Questions</button>
    <button class="part-tab" id="tab2" onclick="switchPart(2)">Part 2 – Cue Cards</button>
  </div>

  <div class="wheel-wrapper">
    <div class="wheel-pointer"></div>
    <div id="wheel" onclick="spinWheel()">
      <div class="hiddenText">Nhấn để quay!</div>
    </div>
  </div>

  <div class="result-box" id="result">
    <div id="topicBadge"></div>
    <div id="resultText">—</div>
  </div>

  <div class="timer-box" id="timerBox">
    <div class="timer-phase" id="timerPhase">Chuẩn bị</div>
    <div class="timer-display" id="timerDisplay">1:00</div>
    <div class="timer-bar-wrap"><div class="timer-bar prep-bar" id="timerBar"></div></div>
    <div class="timer-btn-row">
      <button onclick="startTimer()" id="btnStartTimer">▶ Bắt đầu</button>
      <button class="secondary" onclick="skipPhase()" id="btnSkip">⏭ Bỏ qua</button>
      <button class="danger" onclick="stopTimer()">⏹ Dừng</button>
    </div>
  </div>

  <div class="topic-filter-panel">
    <div class="topic-filter-header" onclick="toggleFilterBody()">
      <span>🗂 Chọn chủ đề để quay</span>
      <span class="sel-count" id="selCount">Tất cả</span>
    </div>
    <div class="topic-filter-body" id="filterBody">
      <div class="filter-actions">
        <button onclick="selectAllTopics()">✅ Chọn tất cả</button>
        <button onclick="deselectAllTopics()">⬜ Bỏ chọn tất cả</button>
      </div>
      <div class="topic-checkbox-list" id="topicCheckboxList"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="spinWheel()">🎯 Quay ngẫu nhiên</button>
    <label>
      <input type="checkbox" id="removeSelected" />
      Xóa câu đã quay
    </label>
  </div>

  <div class="btn-row">
    <button class="secondary" onclick="toggleAddPanel()">➕ Thêm câu hỏi</button>
    <button class="secondary" onclick="toggleOptionList()">📋 Xem tất cả câu hỏi</button>
    <button class="danger" onclick="resetToDefaults()">🔄 Khôi phục mặc định</button>
  </div>

  <div class="add-panel" id="addPanel" style="display:none;">
    <label>Chủ đề:</label>
    <select id="topicSelect"></select>
    <label>Hoặc thêm chủ đề mới:</label>
    <input type="text" id="newTopic" placeholder="Tên chủ đề mới (để trống nếu dùng chủ đề trên)" />
    <label>Câu hỏi:</label>
    <input type="text" id="newQuestion" placeholder="Nhập câu hỏi..." />
    <button onclick="addQuestion()">✅ Thêm vào</button>
  </div>

  <div class="option-list" id="optionList">
    <h3>📋 Danh sách câu hỏi</h3>
    <div id="optionContent"></div>
  </div>

  <script>
    const DEFAULT_QUESTIONS = {
      "Views": [
        "Do you like taking pictures of different views?",
        "Do you prefer views in urban areas or rural areas?",
        "Do you prefer views in your own country or in other countries?",
        "Have you seen an unforgettable and beautiful view or scenery?"
      ],
      "Life stages": [
        "Do you enjoy being the age you are now?",
        "What did you often do with your friends in your childhood?",
        "What do you think is the most important at the moment?",
        "Do you have any plans for the next five years?",
        "How do people remember each stage of their lives?",
        "At what age do you think people are the happiest?"
      ],
      "Building": [
        "Are there tall buildings near your home?",
        "Do you take photos of buildings?",
        "Is there a building that you would like to visit?"
      ],
      "Scenery": [
        "Do you look out the window at the scenery when travelling by bus or car?",
        "Do you prefer the mountains or the sea?",
        "Do you like to take scenery pictures?",
        "What are the most beautiful sights you have seen while travelling?"
      ],
      "Reading": [
        "Do you like reading?",
        "Do you prefer to read on paper or on a screen?",
        "When do you need to read carefully, and when not?",
        "Do you prefer scanning or detailed reading?"
      ],
      "Sports team": [
        "Have you ever been part of a sports team?",
        "Are team sports popular in your culture?",
        "Do you like watching team games? Why?",
        "What are the differences between team sports and individual sports?"
      ],
      "Walking": [
        "Do you walk a lot?",
        "Did you often go outside to have a walk when you were a child?",
        "Why do people like to walk in parks?",
        "Where would you like to take a long walk if you had the chance?",
        "Where did you go for a walk lately?"
      ],
      "Typing": [
        "Do you prefer typing or handwriting?",
        "Do you type on a desktop or laptop keyboard every day?",
        "When did you learn how to type on a keyboard?",
        "How do you improve your typing?"
      ],
      "Food": [
        "What is your favourite food?",
        "What kind of food did you like when you were young?",
        "Has your favourite food changed since you were a child?",
        "Do you eat different foods at different times of the year?"
      ],
      "Hobby": [
        "Do you have the same hobbies as your family members?",
        "Do you have a hobby that you've had since childhood?",
        "Did you have any hobbies when you were a child?",
        "Do you have any hobbies?"
      ],
      "Gifts": [
        "What gift have you received recently?",
        "Have you ever sent handmade gifts to others?",
        "Have you ever received a great gift?",
        "What do you consider when choosing a gift?",
        "Do you think you are good at choosing gifts?"
      ],
      "Day off": [
        "When was the last time you had a few days off?",
        "What do you usually do when you have days off?",
        "Do you usually spend your days off with your parents or with your friends?",
        "What would you like to do if you had a day off tomorrow?"
      ],
      "Keys": [
        "Do you always bring a lot of keys with you?",
        "Have you ever lost your keys?",
        "Do you often forget the keys and lock yourself out?",
        "Do you think it's a good idea to leave your keys with a neighbour?"
      ],
      "Morning time": [
        "Do you like getting up early in the morning?",
        "What do you usually do in the morning?",
        "What did you do in the morning when you were little? Why?",
        "Are there any differences between what you do in the morning now and what you did in the past?",
        "Do you spend your mornings doing the same things on both weekends and weekdays? Why?"
      ],
      "Dreams": [
        "Can you remember the dreams you had?",
        "Do you share your dreams with others?",
        "Do you think dreams have special meanings?",
        "Do you want to make your dreams come true?"
      ],
      "Mirrors": [
        "Do you like looking at yourself in the mirror? How often?",
        "Have you ever bought mirrors?",
        "Do you usually take a mirror with you?",
        "Would you use mirrors to decorate your room?"
      ],
      "Childhood activities": [
        "What are your favourite activities?",
        "What were your favourite activities when you were a child?",
        "Did you prefer to do activities alone or with a group of people when you were a child?",
        "Are there any differences between the activities you liked when you were a child and those you like now?"
      ],
      "The city you live in": [
        "Would you recommend your city to others?",
        "What's the weather like where you live?",
        "Are there people of different ages living in this city?",
        "Are the people friendly in the city?",
        "Is the city friendly to children and old people?",
        "Do you often see your neighbors?",
        "What city do you live in?",
        "Do you like this city? Why?",
        "How long have you lived in this city?",
        "Are there big changes in this city?",
        "Is this city your permanent residence?"
      ],
      "Pets and Animals": [
        "What's your favourite animal? Why?",
        "Where do you prefer to keep your pet, indoors or outdoors?",
        "Have you ever had a pet before?",
        "What is the most popular animal in Vietnam?"
      ],
      "Rules": [
        "Are there any rules for students at your school?",
        "Do you think students would benefit more from more rules?",
        "Have you ever had a really dedicated teacher?",
        "Do you prefer to have more or fewer rules at school?"
      ]
    };

    const DEFAULT_QUESTIONS_P2 = {
      "A helpful / kind / inspiring person": [
        "Describe a person who often helps others",
        "Describe a person who likes to look after the natural world",
        "Describe a good friend who is important to you",
        "Describe a good habit your friend has",
        "Describe a person who makes plans a lot",
        "Describe an old person you enjoy talking to"
      ],
      "A talented / famous person": [
        "Describe a famous person you would like to meet",
        "Describe a popular person",
        "Describe a creative person you admire",
        "Describe a successful sportsperson",
        "Describe a friend who is good at music"
      ],
      "A specific person (friend / family)": [
        "Describe a child who loves drawing",
        "Describe a person working in a family business",
        "Describe a family member you felt proud of"
      ],
      "A place you like / enjoy": [
        "Describe a city you enjoyed visiting",
        "Describe a natural place",
        "Describe your favourite place in your house"
      ],
      "A journey / trip": [
        "Describe a long journey you had",
        "Describe a trip you would like to go"
      ],
      "A job / future plan": [
        "Describe a perfect job",
        "Describe a short-term job in a foreign country"
      ],
      "Learning / self-development": [
        "Describe a person who learned something without a teacher",
        "Describe a subject of science you want to learn",
        "Describe a positive change in your routine"
      ],
      "Technology / app": [
        "Describe a piece of technology",
        "Describe a program or app"
      ],
      "Online content": [
        "Describe something interesting on social media"
      ],
      "A memorable experience": [
        "Describe an exciting activity",
        "Describe an occasion when many people were smiling",
        "Describe a time you waited for something special"
      ],
      "A negative experience": [
        "Describe an event you didn't enjoy",
        "Describe a movie you were disappointed about"
      ],
      "A situation / problem": [
        "Describe a time you broke something",
        "Describe a time electricity went off",
        "Describe a time you got lost"
      ],
      "Interaction with others": [
        "Describe a time you gave advice",
        "Describe an important decision with others",
        "Describe a time someone apologized"
      ],
      "Language / communication": [
        "Describe the first time you spoke a foreign language"
      ],
      "Food – A meal": [
        "Describe a great dinner",
        "Describe an unusual meal"
      ],
      "Something important / useful": [
        "Describe something you can't live without",
        "Describe a book you found useful",
        "Describe a family item"
      ],
      "Childhood item": [
        "Describe a toy you liked"
      ],
      "Nature / animal": [
        "Describe a wild animal",
        "Describe something you saw in the sky"
      ],
      "Standalone topics": [
        "Describe a time when you were not allowed to use your phone",
        "Describe a time when you received good service",
        "Describe an interesting traditional story"
      ]
    };

    let currentPart = 1;

    function storageKey() {
      return currentPart === 1 ? 'ielts_sp1_questions' : 'ielts_sp2_questions';
    }

    function defaultData() {
      return currentPart === 1 ? DEFAULT_QUESTIONS : DEFAULT_QUESTIONS_P2;
    }

    function loadQuestions() {
      try {
        const raw = localStorage.getItem(storageKey());
        if (raw) return JSON.parse(raw);
      } catch(e) {}
      return JSON.parse(JSON.stringify(defaultData()));
    }

    function saveQuestions(data) {
      localStorage.setItem(storageKey(), JSON.stringify(data));
    }

    function flatList(data) {
      const list = [];
      for (const [topic, qs] of Object.entries(data)) {
        for (const q of qs) list.push({ topic, question: q });
      }
      return list;
    }

    let totalRotation = 0;
    let spinning = false;

    function generateColors(n) {
      return [...Array(n).keys()].map(i => `hsl(${Math.floor(i * 360 / n)}, 65%, 62%)`);
    }

    function getCheckedTopics() {
      return [...document.querySelectorAll('.topic-cb:checked')].map(cb => cb.value);
    }

    function updateSelCount() {
      const all = document.querySelectorAll('.topic-cb').length;
      const checked = getCheckedTopics().length;
      const el = document.getElementById('selCount');
      el.textContent = checked === all ? 'Tất cả' : checked + '/' + all + ' chủ đề';
    }

    function getFilteredItems() {
      const data = loadQuestions();
      const checked = getCheckedTopics();
      const list = [];
      for (const topic of checked) {
        for (const q of (data[topic] || [])) list.push({ topic, question: q });
      }
      return list;
    }

    function toggleFilterBody() {
      document.getElementById('filterBody').classList.toggle('open');
    }

    function selectAllTopics() {
      document.querySelectorAll('.topic-cb').forEach(cb => cb.checked = true);
      updateSelCount();
      updateWheel();
    }

    function deselectAllTopics() {
      document.querySelectorAll('.topic-cb').forEach(cb => cb.checked = false);
      updateSelCount();
      updateWheel();
    }

    function updateWheel() {
      const items = getFilteredItems();
      const wheel = document.getElementById('wheel');
      if (items.length === 0) {
        wheel.style.background = '#c7d2fe';
        return;
      }
      const colors = generateColors(items.length);
      const pct = 100 / items.length;
      let grad = "conic-gradient(";
      items.forEach((_, i) => {
        grad += `${colors[i]} ${i * pct}% ${(i + 1) * pct}%, `;
      });
      wheel.style.background = grad.slice(0, -2) + ")";
    }

    function spinWheel() {
      if (spinning) return;
      const items = getFilteredItems();
      if (items.length === 0) {
        alert("Không còn câu hỏi nào! Hãy thêm câu hỏi hoặc khôi phục mặc định.");
        return;
      }

      spinning = true;
      document.getElementById('resultText').textContent = '—';
      document.getElementById('topicBadge').textContent = '';
      document.querySelector('.hiddenText').textContent = '...';

      const extra = 360 * (5 + Math.floor(Math.random() * 4));
      totalRotation += extra;
      const wheel = document.getElementById('wheel');
      wheel.style.transform = `rotate(${totalRotation}deg)`;

      setTimeout(() => {
        const idx = Math.floor(Math.random() * items.length);
        const picked = items[idx];
        document.querySelector('.hiddenText').textContent = picked.question;
        document.getElementById('topicBadge').innerHTML = `<span class="topic-badge">📌 ${picked.topic}</span>`;
        document.getElementById('resultText').textContent = picked.question;

        // Show & reset timer after spin
        stopTimer();
        showTimer(true);

        if (document.getElementById('removeSelected').checked) {
          const fresh = loadQuestions();
          fresh[picked.topic] = (fresh[picked.topic] || []).filter(q => q !== picked.question);
          if (fresh[picked.topic].length === 0) delete fresh[picked.topic];
          saveQuestions(fresh);
          updateWheel();
          populateTopicSelect();
        }

        spinning = false;
      }, 2100);
    }

    function populateTopicSelect() {
      const data = loadQuestions();
      const topics = Object.keys(data);

      // Populate add-panel topic select
      const sel = document.getElementById('topicSelect');
      sel.innerHTML = '';
      topics.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        sel.appendChild(opt);
      });

      // Populate checkbox list — keep previously checked topics checked
      const prevChecked = new Set(getCheckedTopics());
      const list = document.getElementById('topicCheckboxList');
      list.innerHTML = '';
      topics.forEach(t => {
        const lbl = document.createElement('label');
        lbl.className = 'topic-checkbox-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'topic-cb';
        cb.value = t;
        // Check if previously selected, or default to all checked
        cb.checked = prevChecked.size === 0 ? true : prevChecked.has(t);
        cb.addEventListener('change', () => { updateSelCount(); updateWheel(); });
        lbl.appendChild(cb);
        lbl.appendChild(document.createTextNode(t));
        list.appendChild(lbl);
      });

      updateSelCount();
      updateWheel();
    }

    function addQuestion() {
      const newTopic = document.getElementById('newTopic').value.trim();
      const selTopic = document.getElementById('topicSelect').value;
      const topic = newTopic || selTopic;
      const question = document.getElementById('newQuestion').value.trim();

      if (!topic) { alert("Vui lòng chọn hoặc nhập chủ đề!"); return; }
      if (!question) { alert("Vui lòng nhập câu hỏi!"); return; }

      const data = loadQuestions();
      if (!data[topic]) data[topic] = [];
      if (data[topic].includes(question)) { alert("Câu hỏi này đã tồn tại!"); return; }
      data[topic].push(question);
      saveQuestions(data);

      document.getElementById('newQuestion').value = '';
      document.getElementById('newTopic').value = '';
      populateTopicSelect();
      updateWheel();
      renderOptionList();
      alert('✅ Đã thêm vào chủ đề "' + topic + '"!');
    }

    function renderOptionList() {
      const data = loadQuestions();
      const container = document.getElementById('optionContent');
      container.innerHTML = '';
      for (const [topic, qs] of Object.entries(data)) {
        const sec = document.createElement('div');
        sec.className = 'topic-section';
        const h4 = document.createElement('h4');
        h4.textContent = topic + ' (' + qs.length + ')';
        sec.appendChild(h4);
        const ul = document.createElement('ul');
        qs.forEach((q, i) => {
          const li = document.createElement('li');
          const span = document.createElement('span');
          span.textContent = q;
          const btn = document.createElement('button');
          btn.className = 'del-btn';
          btn.title = 'Xóa câu này';
          btn.textContent = '✕';
          btn.onclick = () => deleteQuestion(topic, i);
          li.appendChild(span);
          li.appendChild(btn);
          ul.appendChild(li);
        });
        sec.appendChild(ul);
        container.appendChild(sec);
      }
    }

    function deleteQuestion(topic, index) {
      if (!confirm("Xóa câu hỏi này?")) return;
      const data = loadQuestions();
      data[topic].splice(index, 1);
      if (data[topic].length === 0) delete data[topic];
      saveQuestions(data);
      renderOptionList();
      updateWheel();
      populateTopicSelect();
    }

    function toggleAddPanel() {
      const p = document.getElementById('addPanel');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    function toggleOptionList() {
      const p = document.getElementById('optionList');
      if (p.style.display === 'none') {
        renderOptionList();
        p.style.display = 'block';
      } else {
        p.style.display = 'none';
      }
    }

    function resetToDefaults() {
      if (!confirm("⚠️ Khôi phục toàn bộ câu hỏi về mặc định? Các câu đã thêm sẽ bị mất.")) return;
      saveQuestions(JSON.parse(JSON.stringify(defaultData())));
      updateWheel();
      populateTopicSelect();
      renderOptionList();
      document.querySelector('.hiddenText').textContent = 'Nhấn để quay!';
      document.getElementById('resultText').textContent = '—';
      document.getElementById('topicBadge').textContent = '';
      alert("✅ Đã khôi phục câu hỏi mặc định!");
    }

    // ── Timer ────────────────────────────────────────────────────────────
    let timerInterval = null;
    let timerSecondsLeft = 0;
    let timerTotalSeconds = 0;
    let timerPhase = 'idle'; // 'prep' | 'speak' | 'idle'

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return m + ':' + String(sec).padStart(2, '0');
    }

    function updateTimerUI() {
      const display = document.getElementById('timerDisplay');
      const bar = document.getElementById('timerBar');
      const phase = document.getElementById('timerPhase');

      display.textContent = formatTime(timerSecondsLeft);
      const pct = timerTotalSeconds > 0 ? (timerSecondsLeft / timerTotalSeconds) * 100 : 100;
      bar.style.width = pct + '%';

      const warn = timerSecondsLeft <= 10;
      display.classList.toggle('warn', warn);

      if (timerPhase === 'prep') {
        phase.textContent = '📓 Chuẩn bị (1 phút)';
        phase.className = 'timer-phase prep';
        bar.className = 'timer-bar ' + (warn ? 'warn-bar' : 'prep-bar');
      } else if (timerPhase === 'speak') {
        phase.textContent = '🎤 Trả lời (2 phút)';
        phase.className = 'timer-phase speak';
        bar.className = 'timer-bar ' + (warn ? 'warn-bar' : 'speak-bar');
      }
    }

    function beep(freq, duration) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
      } catch(e) {}
    }

    function startSpeakPhase() {
      timerPhase = 'speak';
      timerSecondsLeft = 120;
      timerTotalSeconds = 120;
      document.getElementById('btnSkip').textContent = '⏭ Bỏ qua';
      beep(880, 0.3);
      updateTimerUI();
    }

    function startTimer() {
      if (timerInterval) return;
      if (timerPhase === 'idle' || timerPhase === 'done') {
        // start from prep
        timerPhase = 'prep';
        timerSecondsLeft = 60;
        timerTotalSeconds = 60;
        document.getElementById('btnStartTimer').textContent = '■ Đang chạy...';
        document.getElementById('btnStartTimer').disabled = true;
        updateTimerUI();
      }
      timerInterval = setInterval(() => {
        timerSecondsLeft--;
        updateTimerUI();
        if (timerSecondsLeft <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          if (timerPhase === 'prep') {
            beep(660, 0.2);
            setTimeout(() => beep(880, 0.3), 250);
            startSpeakPhase();
            timerInterval = setInterval(() => {
              timerSecondsLeft--;
              updateTimerUI();
              if (timerSecondsLeft <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                timerPhase = 'done';
                document.getElementById('timerPhase').textContent = '✅ Hết giờ!';
                document.getElementById('timerPhase').className = 'timer-phase done';
                document.getElementById('timerDisplay').textContent = '0:00';
                document.getElementById('timerBar').style.width = '0%';
                document.getElementById('btnStartTimer').textContent = '▶ Bắt đầu lại';
                document.getElementById('btnStartTimer').disabled = false;
                timerPhase = 'idle';
                beep(440, 0.15);
                setTimeout(() => beep(440, 0.15), 200);
                setTimeout(() => beep(440, 0.15), 400);
              }
            }, 1000);
          }
        }
      }, 1000);
    }

    function skipPhase() {
      if (timerPhase === 'prep') {
        clearInterval(timerInterval);
        timerInterval = null;
        startSpeakPhase();
        startTimer();
      } else if (timerPhase === 'speak') {
        clearInterval(timerInterval);
        timerInterval = null;
        timerPhase = 'idle';
        document.getElementById('timerPhase').textContent = '✅ Hết giờ!';
        document.getElementById('timerPhase').className = 'timer-phase done';
        document.getElementById('timerDisplay').textContent = '0:00';
        document.getElementById('timerBar').style.width = '0%';
        document.getElementById('btnStartTimer').textContent = '▶ Bắt đầu lại';
        document.getElementById('btnStartTimer').disabled = false;
      }
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      timerPhase = 'idle';
      timerSecondsLeft = 60;
      timerTotalSeconds = 60;
      document.getElementById('timerPhase').textContent = 'Chuẩn bị';
      document.getElementById('timerPhase').className = 'timer-phase prep';
      document.getElementById('timerDisplay').textContent = '1:00';
      document.getElementById('timerBar').style.width = '100%';
      document.getElementById('timerBar').className = 'timer-bar prep-bar';
      document.getElementById('btnStartTimer').textContent = '▶ Bắt đầu';
      document.getElementById('btnStartTimer').disabled = false;
    }

    function showTimer(show) {
      document.getElementById('timerBox').style.display = show ? 'block' : 'none';
      if (!show) stopTimer();
    }

    function switchPart(part) {
      showTimer(false);
      stopTimer();
      currentPart = part;
      document.getElementById('tab1').classList.toggle('active', part === 1);
      document.getElementById('tab2').classList.toggle('active', part === 2);
      document.getElementById('mainTitle').textContent =
        part === 1 ? '🌀 IELTS Speaking Part 1' : '🌀 IELTS Speaking Part 2';
      document.querySelector('.hiddenText').textContent = 'Nhấn để quay!';
      document.getElementById('resultText').textContent = '—';
      document.getElementById('topicBadge').textContent = '';
      document.getElementById('optionList').style.display = 'none';
      document.getElementById('addPanel').style.display = 'none';
      document.getElementById('filterBody').classList.remove('open');
      populateTopicSelect();
    }

    updateWheel();
    populateTopicSelect();
  </script>
</body>
</html>
