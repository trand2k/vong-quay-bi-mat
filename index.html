<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IELTS Speaking – Vòng Quay Luyện Tập 🔄</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      margin-bottom: 0.5rem;
      color: #312e81;
      font-size: 1.8rem;
      text-align: center;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    .wheel-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 1rem 0;
    }

    #wheel {
      width: 320px;
      height: 320px;
      border: 8px solid #a5b4fc;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: transform 2s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      background: #c7d2fe;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(79,70,229,0.18);
    }

    .hiddenText {
      color: #fff;
      text-align: center;
      padding: 0 20px;
      font-weight: 600;
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
      word-break: break-word;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .wheel-pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 28px solid #dc2626;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      z-index: 10;
    }

    .result-box {
      background: #fff;
      border: 2px solid #6366f1;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      color: #312e81;
      min-height: 3rem;
      margin: 0.5rem 0 1rem;
      word-break: break-word;
      line-height: 1.5;
    }

    .topic-badge {
      font-size: 0.8rem;
      font-weight: 600;
      background: #e0e7ff;
      color: #4338ca;
      border-radius: 20px;
      padding: 2px 10px;
      margin-bottom: 6px;
      display: inline-block;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    button {
      padding: 0.5rem 1.1rem;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #4f46e5;
      color: white;
      font-weight: 600;
      transition: background 0.15s;
    }

    button:hover { background-color: #4338ca; }
    button.danger { background-color: #dc2626; }
    button.danger:hover { background-color: #b91c1c; }
    button.secondary { background-color: #6b7280; }
    button.secondary:hover { background-color: #4b5563; }

    .add-panel {
      background: #fff;
      border: 1px solid #c7d2fe;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      max-width: 480px;
      width: 100%;
      margin-bottom: 1rem;
    }

    .add-panel label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    .add-panel select, .add-panel input[type="text"] {
      width: 100%;
      padding: 0.4rem 0.6rem;
      border: 1px solid #a5b4fc;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 0.6rem;
    }

    .option-list {
      background: #fff;
      border: 1px solid #c7d2fe;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      max-width: 480px;
      width: 100%;
      display: none;
      max-height: 55vh;
      overflow-y: auto;
    }

    .option-list h3 {
      margin: 0 0 0.6rem;
      color: #312e81;
    }

    .topic-section { margin-bottom: 1rem; }

    .topic-section h4 {
      background: #e0e7ff;
      color: #3730a3;
      border-radius: 6px;
      padding: 3px 8px;
      margin: 0 0 0.4rem;
      font-size: 0.9rem;
    }

    .topic-section ul {
      padding-left: 1.2rem;
      margin: 0;
    }

    .topic-section li {
      margin-bottom: 0.25rem;
      font-size: 0.88rem;
      color: #374151;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .topic-section li span { flex: 1; }

    .del-btn {
      background: none;
      border: none;
      color: #dc2626;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
      color: #374151;
      cursor: pointer;
    }

    .topic-filter-panel {
      background: #fff;
      border: 1px solid #c7d2fe;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      max-width: 480px;
      width: 100%;
      margin-bottom: 0.75rem;
    }

    .topic-filter-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .topic-filter-header span {
      font-weight: 700;
      color: #312e81;
      font-size: 0.95rem;
    }

    .topic-filter-header .sel-count {
      font-size: 0.8rem;
      background: #e0e7ff;
      color: #4338ca;
      border-radius: 20px;
      padding: 1px 9px;
      font-weight: 600;
    }

    .topic-filter-body {
      display: none;
      margin-top: 0.6rem;
    }

    .topic-filter-body.open { display: block; }

    .filter-actions {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }

    .filter-actions button {
      font-size: 0.78rem;
      padding: 0.25rem 0.7rem;
      background: #e0e7ff;
      color: #3730a3;
      border-radius: 6px;
    }

    .filter-actions button:hover { background: #c7d2fe; }

    .topic-checkbox-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.3rem 0.6rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .topic-checkbox-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.85rem;
      color: #374151;
      cursor: pointer;
    }

    .topic-checkbox-item input { cursor: pointer; accent-color: #4f46e5; }

    .part-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .part-tab {
      padding: 0.4rem 1.3rem;
      font-size: 0.9rem;
      font-weight: 700;
      border: 2px solid #4f46e5;
      border-radius: 20px;
      cursor: pointer;
      background: #fff;
      color: #4f46e5;
    }

    .part-tab.active {
      background: #4f46e5;
      color: #fff;
    }

    .part-tab:hover:not(.active) { background: #e0e7ff; }

    /* ── Timer ── */
    .timer-box {
      background: #fff;
      border: 2px solid #6366f1;
      border-radius: 14px;
      padding: 0.8rem 1.2rem;
      max-width: 480px;
      width: 100%;
      margin: 0 0 0.75rem;
      display: none;
    }

    .timer-phase {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .timer-phase.prep  { color: #d97706; }
    .timer-phase.speak { color: #16a34a; }
    .timer-phase.done  { color: #6b7280; }

    .timer-display {
      font-size: 2.6rem;
      font-weight: 800;
      color: #312e81;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .timer-display.warn { color: #dc2626; }

    .timer-bar-wrap {
      width: 100%;
      height: 8px;
      background: #e0e7ff;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 0.6rem;
    }

    .timer-bar {
      height: 100%;
      border-radius: 99px;
      transition: width 1s linear, background 0.3s;
      background: #6366f1;
    }

    .timer-bar.prep-bar  { background: #f59e0b; }
    .timer-bar.speak-bar { background: #22c55e; }
    .timer-bar.warn-bar  { background: #dc2626; }

    .timer-btn-row {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
    }

    .timer-btn-row button {
      font-size: 0.82rem;
      padding: 0.3rem 0.9rem;
    }

    /* ── Hint ── */
    button.hint-btn { background: #d97706; }
    button.hint-btn:hover { background: #b45309; }

    .hint-panel {
      background: #fffbeb;
      border: 2px solid #fcd34d;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      max-width: 480px;
      width: 100%;
      margin-bottom: 0.75rem;
      text-align: left;
    }

    .hint-answer {
      font-size: 0.88rem;
      color: #374151;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .hint-vocab {
      margin-top: 0.7rem;
      padding-top: 0.6rem;
      border-top: 1px dashed #fcd34d;
    }

    .hint-vocab-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #92400e;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hint-vocab ul {
      padding-left: 1.2rem;
      margin: 0;
    }

    .hint-vocab li {
      font-size: 0.83rem;
      color: #78350f;
      margin-bottom: 0.25rem;
      line-height: 1.55;
    }

    /* ── User tabs ── */
    .user-tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .user-tab {
      padding: 0.3rem 1.1rem;
      font-size: 0.82rem;
      font-weight: 700;
      border: 2px solid #d97706;
      border-radius: 20px;
      cursor: pointer;
      background: #fff;
      color: #d97706;
    }

    .user-tab.active {
      background: #d97706;
      color: #fff;
    }

    .user-tab:hover:not(.active) { background: #fef3c7; }
  </style>
</head>
<body>

  <h1 id="mainTitle">🌀 IELTS Speaking Part 1</h1>
  <p class="subtitle">Quay vòng để lấy câu hỏi / cue card ngẫu nhiên!</p>

  <div class="part-tabs">
    <button class="part-tab active" id="tab1" onclick="switchPart(1)">Part 1 – Questions</button>
    <button class="part-tab" id="tab2" onclick="switchPart(2)">Part 2 – Cue Cards</button>
  </div>

  <div class="user-tabs">
    <button class="user-tab active" id="userTabLinh" onclick="switchUser('linh')">👩 Linh</button>
    <button class="user-tab" id="userTabTra" onclick="switchUser('tra')">� Trà</button>
  </div>

  <div class="wheel-wrapper">
    <div class="wheel-pointer"></div>
    <div id="wheel" onclick="spinWheel()">
      <div class="hiddenText">Nhấn để quay!</div>
    </div>
  </div>

  <div class="result-box" id="result">
    <div id="topicBadge"></div>
    <div id="resultText">—</div>
  </div>

  <div id="hintRow" class="btn-row" style="display:none;">
    <button class="hint-btn" id="hintBtn" onclick="toggleHint()">💡 Xem gợi ý</button>
  </div>

  <div class="hint-panel" id="hintPanel" style="display:none;">
    <div class="hint-answer" id="hintAnswer"></div>
    <div class="hint-vocab" id="hintVocab"></div>
  </div>

  <div class="timer-box" id="timerBox">
    <div class="timer-phase" id="timerPhase">Chuẩn bị</div>
    <div class="timer-display" id="timerDisplay">1:00</div>
    <div class="timer-bar-wrap"><div class="timer-bar prep-bar" id="timerBar"></div></div>
    <div class="timer-btn-row">
      <button onclick="startTimer()" id="btnStartTimer">▶ Bắt đầu</button>
      <button class="secondary" onclick="skipPhase()" id="btnSkip">⏭ Bỏ qua</button>
      <button class="danger" onclick="stopTimer()">⏹ Dừng</button>
    </div>
  </div>

  <div class="topic-filter-panel">
    <div class="topic-filter-header" onclick="toggleFilterBody()">
      <span>🗂 Chọn chủ đề để quay</span>
      <span class="sel-count" id="selCount">Tất cả</span>
    </div>
    <div class="topic-filter-body" id="filterBody">
      <div class="filter-actions">
        <button onclick="selectAllTopics()">✅ Chọn tất cả</button>
        <button onclick="deselectAllTopics()">⬜ Bỏ chọn tất cả</button>
      </div>
      <div class="topic-checkbox-list" id="topicCheckboxList"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="spinWheel()">🎯 Quay ngẫu nhiên</button>
    <label>
      <input type="checkbox" id="removeSelected" />
      Xóa câu đã quay
    </label>
  </div>

  <div class="btn-row">
    <button class="secondary" onclick="toggleAddPanel()">➕ Thêm câu hỏi</button>
    <button class="secondary" onclick="toggleOptionList()">📋 Xem tất cả câu hỏi</button>
    <button class="danger" onclick="resetToDefaults()">🔄 Khôi phục mặc định</button>
  </div>

  <div class="add-panel" id="addPanel" style="display:none;">
    <label>Chủ đề:</label>
    <select id="topicSelect"></select>
    <label>Hoặc thêm chủ đề mới:</label>
    <input type="text" id="newTopic" placeholder="Tên chủ đề mới (để trống nếu dùng chủ đề trên)" />
    <label>Câu hỏi:</label>
    <input type="text" id="newQuestion" placeholder="Nhập câu hỏi..." />
    <button onclick="addQuestion()">✅ Thêm vào</button>
  </div>

  <div class="option-list" id="optionList">
    <h3>📋 Danh sách câu hỏi</h3>
    <div id="optionContent"></div>
  </div>

  <script>
    const DEFAULT_QUESTIONS = {

      "Dreams": [

      "Mirrors": [

      "Childhood activities": [

      ],
      "The city you live in": [

        "What's the weather like where you live?",
        "Are there people of different ages living in this city?",

        "Do you often see your neighbors?",

        "Is this city your permanent residence?"
      ],
      "Pets and Animals": [

      ],
      "Rules": [

      ],
      "Cars": [

      ],
      "Watch": [
        "Do you wear a watch?",
        "Have you ever got a watch as a gift?",
        "Why do some people wear expensive watches?",
        "Do you think it is important to wear a watch? Why?"
      ],
      "Tidiness": [
        "Do you like to keep things tidy?",

    const DEFAULT_QUESTIONS_P2 = {
      "A helpful / kind / inspiring person": [
        "Describe a person who often helps others",
        "Describe a person who likes to look after the natural world",
        "Describe a good friend who is important to you",
        "Describe a good habit your friend has",
        "Describe a person who makes plans a lot",
        "Describe an old person you enjoy talking to"
      ],
      "A talented / famous person": [

    // ── Hint scripts (question text → {answer, vocab[]}) ───────────────

      try {
        const raw = localStorage.getItem(storageKey());
        if (raw) return JSON.parse(raw);
      } catch(e) {}
      return JSON.parse(JSON.stringify(defaultData()));
    }

    function saveQuestions(data) {
      localStorage.setItem(storageKey(), JSON.stringify(data));
    }

    function flatList(data) {
      const list = [];
      for (const [topic, qs] of Object.entries(data)) {
        for (const q of qs) list.push({ topic, question: q });
      }
      return list;
    }

    let totalRotation = 0;
    let spinning = false;

    function generateColors(n) {
      return [...Array(n).keys()].map(i => `hsl(${Math.floor(i * 360 / n)}, 65%, 62%)`);
    }

    function getCheckedTopics() {
      return [...document.querySelectorAll('.topic-cb:checked')].map(cb => cb.value);
    }

    function updateSelCount() {
      const all = document.querySelectorAll('.topic-cb').length;
      const checked = getCheckedTopics().length;
      const el = document.getElementById('selCount');
      el.textContent = checked === all ? 'Tất cả' : checked + '/' + all + ' chủ đề';
    }

    function getFilteredItems() {
      const data = loadQuestions();
      const checked = getCheckedTopics();
      const list = [];
      for (const topic of checked) {
        for (const q of (data[topic] || [])) list.push({ topic, question: q });
      }
      return list;
    }

    function toggleFilterBody() {
      document.getElementById('filterBody').classList.toggle('open');
    }

    function selectAllTopics() {
      document.querySelectorAll('.topic-cb').forEach(cb => cb.checked = true);
      updateSelCount();
      updateWheel();
    }

    function deselectAllTopics() {
      document.querySelectorAll('.topic-cb').forEach(cb => cb.checked = false);
      updateSelCount();
      updateWheel();
    }

    function updateWheel() {
      const items = getFilteredItems();
      const wheel = document.getElementById('wheel');
      if (items.length === 0) {
        wheel.style.background = '#c7d2fe';
        return;
      }
      const colors = generateColors(items.length);
      const pct = 100 / items.length;
      let grad = "conic-gradient(";
      items.forEach((_, i) => {
        grad += `${colors[i]} ${i * pct}% ${(i + 1) * pct}%, `;
      });
      wheel.style.background = grad.slice(0, -2) + ")";
    }

    function spinWheel() {
      if (spinning) return;
      const items = getFilteredItems();
      if (items.length === 0) {
        alert("Không còn câu hỏi nào! Hãy thêm câu hỏi hoặc khôi phục mặc định.");
        return;
      }

      spinning = true;
      document.getElementById('resultText').textContent = '—';
      document.getElementById('topicBadge').textContent = '';
      document.getElementById('hintRow').style.display = 'none';
      document.getElementById('hintPanel').style.display = 'none';
      document.querySelector('.hiddenText').textContent = '...';

      const extra = 360 * (5 + Math.floor(Math.random() * 4));
      totalRotation += extra;
      const wheel = document.getElementById('wheel');
      wheel.style.transform = `rotate(${totalRotation}deg)`;

      setTimeout(() => {
        const idx = Math.floor(Math.random() * items.length);
        const picked = items[idx];
        document.querySelector('.hiddenText').textContent = picked.question;
        document.getElementById('topicBadge').innerHTML = `<span class="topic-badge">📌 ${picked.topic}</span>`;
        document.getElementById('resultText').textContent = picked.question;

        // Show hint button if a script exists for this question
        currentQuestion = picked.question;
        document.getElementById('hintPanel').style.display = 'none';
        document.getElementById('hintBtn').textContent = '💡 Xem gợi ý';
        const hints = currentUser === 'linh' ? HINTS_LINH : HINTS_TRA;
        document.getElementById('hintRow').style.display = hints[currentQuestion] ? 'flex' : 'none';

        // Show & reset timer after spin
        stopTimer();
        showTimer(true);

        if (document.getElementById('removeSelected').checked) {
          const fresh = loadQuestions();
          fresh[picked.topic] = (fresh[picked.topic] || []).filter(q => q !== picked.question);
          if (fresh[picked.topic].length === 0) delete fresh[picked.topic];
          saveQuestions(fresh);
          updateWheel();
          populateTopicSelect();
        }

        spinning = false;
      }, 2100);
    }

    function populateTopicSelect() {
      const data = loadQuestions();
      const topics = Object.keys(data);

      // Populate add-panel topic select
      const sel = document.getElementById('topicSelect');
      sel.innerHTML = '';
      topics.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        sel.appendChild(opt);
      });

      // Populate checkbox list — keep previously checked topics checked
      const prevChecked = new Set(getCheckedTopics());
      const list = document.getElementById('topicCheckboxList');
      list.innerHTML = '';
      topics.forEach(t => {
        const lbl = document.createElement('label');
        lbl.className = 'topic-checkbox-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'topic-cb';
        cb.value = t;
        // Check if previously selected, or default to all checked
        cb.checked = prevChecked.size === 0 ? true : prevChecked.has(t);
        cb.addEventListener('change', () => { updateSelCount(); updateWheel(); });
        lbl.appendChild(cb);
        lbl.appendChild(document.createTextNode(t));
        list.appendChild(lbl);
      });

      updateSelCount();
      updateWheel();
    }

    function addQuestion() {
      const newTopic = document.getElementById('newTopic').value.trim();
      const selTopic = document.getElementById('topicSelect').value;
      const topic = newTopic || selTopic;
      const question = document.getElementById('newQuestion').value.trim();

      if (!topic) { alert("Vui lòng chọn hoặc nhập chủ đề!"); return; }
      if (!question) { alert("Vui lòng nhập câu hỏi!"); return; }

      const data = loadQuestions();
      if (!data[topic]) data[topic] = [];
      if (data[topic].includes(question)) { alert("Câu hỏi này đã tồn tại!"); return; }
      data[topic].push(question);
      saveQuestions(data);

      document.getElementById('newQuestion').value = '';
      document.getElementById('newTopic').value = '';
      populateTopicSelect();
      updateWheel();
      renderOptionList();
      alert('✅ Đã thêm vào chủ đề "' + topic + '"!');
    }

    function renderOptionList() {
      const data = loadQuestions();
      const container = document.getElementById('optionContent');
      container.innerHTML = '';
      for (const [topic, qs] of Object.entries(data)) {
        const sec = document.createElement('div');
        sec.className = 'topic-section';
        const h4 = document.createElement('h4');
        h4.textContent = topic + ' (' + qs.length + ')';
        sec.appendChild(h4);
        const ul = document.createElement('ul');
        qs.forEach((q, i) => {
          const li = document.createElement('li');
          const span = document.createElement('span');
          span.textContent = q;
          const btn = document.createElement('button');
          btn.className = 'del-btn';
          btn.title = 'Xóa câu này';
          btn.textContent = '✕';
          btn.onclick = () => deleteQuestion(topic, i);
          li.appendChild(span);
          li.appendChild(btn);
          ul.appendChild(li);
        });
        sec.appendChild(ul);
        container.appendChild(sec);
      }
    }

    function deleteQuestion(topic, index) {
      if (!confirm("Xóa câu hỏi này?")) return;
      const data = loadQuestions();
      data[topic].splice(index, 1);
      if (data[topic].length === 0) delete data[topic];
      saveQuestions(data);
      renderOptionList();
      updateWheel();
      populateTopicSelect();
    }

    function toggleAddPanel() {
      const p = document.getElementById('addPanel');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    function toggleOptionList() {
      const p = document.getElementById('optionList');
      if (p.style.display === 'none') {
        renderOptionList();
        p.style.display = 'block';
      } else {
        p.style.display = 'none';
      }
    }

    function resetToDefaults() {
      if (!confirm("⚠️ Khôi phục toàn bộ câu hỏi về mặc định? Các câu đã thêm sẽ bị mất.")) return;
      saveQuestions(JSON.parse(JSON.stringify(defaultData())));
      updateWheel();
      populateTopicSelect();
      renderOptionList();
      document.querySelector('.hiddenText').textContent = 'Nhấn để quay!';
      document.getElementById('resultText').textContent = '—';
      document.getElementById('topicBadge').textContent = '';
      document.getElementById('hintRow').style.display = 'none';
      document.getElementById('hintPanel').style.display = 'none';
      currentQuestion = null;
      alert("✅ Đã khôi phục câu hỏi mặc định!");
    }

    // ── Timer ────────────────────────────────────────────────────────────
    let timerInterval = null;
    let timerSecondsLeft = 0;
    let timerTotalSeconds = 0;
    let timerPhase = 'idle'; // 'prep' | 'speak' | 'idle'

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return m + ':' + String(sec).padStart(2, '0');
    }

    function updateTimerUI() {
      const display = document.getElementById('timerDisplay');
      const bar = document.getElementById('timerBar');
      const phase = document.getElementById('timerPhase');

      display.textContent = formatTime(timerSecondsLeft);
      const pct = timerTotalSeconds > 0 ? (timerSecondsLeft / timerTotalSeconds) * 100 : 100;
      bar.style.width = pct + '%';

      const warn = timerSecondsLeft <= 10;
      display.classList.toggle('warn', warn);

      if (timerPhase === 'prep') {
        phase.textContent = '📓 Chuẩn bị (1 phút)';
        phase.className = 'timer-phase prep';
        bar.className = 'timer-bar ' + (warn ? 'warn-bar' : 'prep-bar');
      } else if (timerPhase === 'speak') {
        phase.textContent = '🎤 Trả lời (2 phút)';
        phase.className = 'timer-phase speak';
        bar.className = 'timer-bar ' + (warn ? 'warn-bar' : 'speak-bar');
      }
    }

    function beep(freq, duration) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
      } catch(e) {}
    }

    function startSpeakPhase() {
      timerPhase = 'speak';
      timerSecondsLeft = 120;
      timerTotalSeconds = 120;
      document.getElementById('btnSkip').textContent = '⏭ Bỏ qua';
      beep(880, 0.3);
      updateTimerUI();
    }

    function startTimer() {
      if (timerInterval) return;
      if (timerPhase === 'idle' || timerPhase === 'done') {
        // start from prep
        timerPhase = 'prep';
        timerSecondsLeft = 60;
        timerTotalSeconds = 60;
        document.getElementById('btnStartTimer').textContent = '■ Đang chạy...';
        document.getElementById('btnStartTimer').disabled = true;
        updateTimerUI();
      }
      timerInterval = setInterval(() => {
        timerSecondsLeft--;
        updateTimerUI();
        if (timerSecondsLeft <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          if (timerPhase === 'prep') {
            beep(660, 0.2);
            setTimeout(() => beep(880, 0.3), 250);
            startSpeakPhase();
            timerInterval = setInterval(() => {
              timerSecondsLeft--;
              updateTimerUI();
              if (timerSecondsLeft <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                timerPhase = 'done';
                document.getElementById('timerPhase').textContent = '✅ Hết giờ!';
                document.getElementById('timerPhase').className = 'timer-phase done';
                document.getElementById('timerDisplay').textContent = '0:00';
                document.getElementById('timerBar').style.width = '0%';
                document.getElementById('btnStartTimer').textContent = '▶ Bắt đầu lại';
                document.getElementById('btnStartTimer').disabled = false;
                timerPhase = 'idle';
                beep(440, 0.15);
                setTimeout(() => beep(440, 0.15), 200);
                setTimeout(() => beep(440, 0.15), 400);
              }
            }, 1000);
          }
        }
      }, 1000);
    }

    function skipPhase() {
      if (timerPhase === 'prep') {
        clearInterval(timerInterval);
        timerInterval = null;
        startSpeakPhase();
        startTimer();
      } else if (timerPhase === 'speak') {
        clearInterval(timerInterval);
        timerInterval = null;
        timerPhase = 'idle';
        document.getElementById('timerPhase').textContent = '✅ Hết giờ!';
        document.getElementById('timerPhase').className = 'timer-phase done';
        document.getElementById('timerDisplay').textContent = '0:00';
        document.getElementById('timerBar').style.width = '0%';
        document.getElementById('btnStartTimer').textContent = '▶ Bắt đầu lại';
        document.getElementById('btnStartTimer').disabled = false;
      }
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      timerPhase = 'idle';
      timerSecondsLeft = 60;
      timerTotalSeconds = 60;
      document.getElementById('timerPhase').textContent = 'Chuẩn bị';
      document.getElementById('timerPhase').className = 'timer-phase prep';
      document.getElementById('timerDisplay').textContent = '1:00';
      document.getElementById('timerBar').style.width = '100%';
      document.getElementById('timerBar').className = 'timer-bar prep-bar';
      document.getElementById('btnStartTimer').textContent = '▶ Bắt đầu';
      document.getElementById('btnStartTimer').disabled = false;
    }

    function showTimer(show) {
      document.getElementById('timerBox').style.display = show ? 'block' : 'none';
      if (!show) stopTimer();
    }

    function switchPart(part) {
      showTimer(false);
      stopTimer();
      currentQuestion = null;
      document.getElementById('hintRow').style.display = 'none';
      document.getElementById('hintPanel').style.display = 'none';
      currentPart = part;
      document.getElementById('tab1').classList.toggle('active', part === 1);
      document.getElementById('tab2').classList.toggle('active', part === 2);
      document.getElementById('mainTitle').textContent =
        part === 1 ? '🌀 IELTS Speaking Part 1' : '🌀 IELTS Speaking Part 2';
      document.querySelector('.hiddenText').textContent = 'Nhấn để quay!';
      document.getElementById('resultText').textContent = '—';
      document.getElementById('topicBadge').textContent = '';
      document.getElementById('optionList').style.display = 'none';
      document.getElementById('addPanel').style.display = 'none';
      document.getElementById('filterBody').classList.remove('open');
      populateTopicSelect();
    }

    function toggleHint() {
      const hints = currentUser === 'linh' ? HINTS_LINH : HINTS_TRA;
      const hint = hints[currentQuestion];
      if (!hint) return;
      const panel = document.getElementById('hintPanel');
      const btn = document.getElementById('hintBtn');
      if (panel.style.display === 'none') {
        document.getElementById('hintAnswer').textContent = hint.answer;
        const vocabEl = document.getElementById('hintVocab');
        if (hint.vocab && hint.vocab.length > 0) {
          vocabEl.innerHTML = '<div class="hint-vocab-title">📚 Từ vựng & cụm hay</div><ul>' +
            hint.vocab.map(v => '<li>' + v + '</li>').join('') + '</ul>';
          vocabEl.style.display = 'block';
        } else {
          vocabEl.style.display = 'none';
        }
        panel.style.display = 'block';
        btn.textContent = '🙈 Ẩn gợi ý';
      } else {
        panel.style.display = 'none';
        btn.textContent = '💡 Xem gợi ý';
      }
    }

    function switchUser(user) {
      currentUser = user;
      document.getElementById('userTabLinh').classList.toggle('active', user === 'linh');
      document.getElementById('userTabTra').classList.toggle('active', user === 'tra');
      // Re-evaluate hint button visibility for current question
      if (currentQuestion) {
        const hints = currentUser === 'linh' ? HINTS_LINH : HINTS_TRA;
        document.getElementById('hintPanel').style.display = 'none';
        document.getElementById('hintBtn').textContent = '💡 Xem gợi ý';
        document.getElementById('hintRow').style.display = hints[currentQuestion] ? 'flex' : 'none';
      }
    }

    updateWheel();
    populateTopicSelect();
  </script>
</body>
</html>
